<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Тренировки</title>
  <meta name="theme-color" content="#0d0d1a" />
  <meta name="description" content="Простое PWA для учёта тренировок" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%236366f1'/%3E%3Ctext x='50' y='68' font-size='48' text-anchor='middle' fill='white' font-family='sans-serif'%3E💪%3C/text%3E%3C/svg%3E" />
  <style>
    /* ----- СБРОС И ПЕРЕМЕННЫЕ ----- */
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #0d0d1a;
      --bg-card: #18182b;
      --bg-card-hover: #22223d;
      --bg-input: #12121f;
      --text: #eaeaf5;
      --text-muted: #8888bb;
      --text-dim: #555577;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.25);
      --accent-hover: #8183f5;
      --border: #2a2a4a;
      --shadow: 0 8px 28px rgba(0,0,0,0.6);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --transition: 0.2s ease;
    }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 12px 12px 80px;
      line-height: 1.5;
    }
    #app {
      max-width: 480px;
      width: 100%;
    }
    /* ----- ОБЩИЕ КОМПОНЕНТЫ ----- */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 18px 16px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: background var(--transition);
    }
    .card:hover { background: var(--bg-card-hover); }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background var(--transition), transform 0.1s;
      touch-action: manipulation;
      min-height: 44px;
    }
    .btn:active { transform: scale(0.96); }
    .btn:hover { background: var(--accent-hover); }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { background: var(--bg-card-hover); border-color: var(--accent); }
    .btn-danger {
      background: #dc2626;
    }
    .btn-danger:hover { background: #ef4444; }
    .btn-sm { padding: 6px 14px; font-size: 0.85rem; min-height: 34px; }
    .btn-block { width: 100%; justify-content: center; }
    input, select {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 1rem;
      transition: border var(--transition);
      outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input::placeholder { color: var(--text-dim); }
    input[type="date"] {
      text-align: start !important;
      direction: ltr !important;
      padding-left: 14px !important;
      -webkit-padding-start: 14px !important;
      text-indent: 0 !important;
      -webkit-text-indent: 0 !important;
    }
    input[type="date"]::-webkit-datetime-edit {
      text-align: start !important;
      padding-left: 0 !important;
      margin-left: 0 !important;
    }
    input[type="date"]::-webkit-date-and-time-value {
      text-align: start !important;
      margin-left: 0 !important;
    }
    input[type="date" i] {
      text-align: start !important;
      text-indent: 0 !important;
    }
    /* Костыль для iOS: скрываем нативный текст, показываем свой через ::before */
    .date-wrapper {
      position: relative;
      display: block;
    }
    .date-wrapper input[type="date"] {
      color: transparent !important;
      -webkit-text-fill-color: transparent !important;
    }
    .date-wrapper input[type="date"].has-value {
      color: var(--text) !important;
      -webkit-text-fill-color: var(--text) !important;
    }
    .date-display {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text-dim);
      font-size: 1rem;
    }
    .date-wrapper input[type="date"].has-value + .date-display {
      color: var(--text);
    }
    .flex { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .flex-center { justify-content: center; }
    .flex-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .mt-2 { margin-top: 12px; }
    .mb-2 { margin-bottom: 12px; }
    .text-muted { color: var(--text-muted); font-size: 0.9rem; }
    .text-dim { color: var(--text-dim); font-size: 0.85rem; }
    .fw-bold { font-weight: 700; }
    .tag {
      display: inline-block;
      background: var(--bg-input);
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    /* ----- ВКЛАДКИ (табы) ----- */
    .tabs {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 100;
      padding: 6px 0 env(safe-area-inset-bottom);
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-dim);
      padding: 10px 0 6px;
      font-size: 0.75rem;
      font-weight: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      transition: color var(--transition);
      touch-action: manipulation;
      border-top: 3px solid transparent;
    }
    .tab-btn .icon { font-size: 1.5rem; line-height: 1; }
    .tab-btn.active {
      color: var(--accent);
      border-top-color: var(--accent);
    }
    .tab-btn:active { opacity: 0.6; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    /* ----- СПИСОК ТРЕНИРОВОК ----- */
    .workout-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .workout-item:last-child { border-bottom: none; }
    .workout-item .workout-info {
      flex: 1;
      min-width: 0;
      padding-right: 12px;
    }
    .workout-date { font-size: 1.1rem; font-weight: 600; }
    .workout-exercises { font-size: 0.9rem; color: var(--text-muted); margin-top: 2px; }
    .workout-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    /* ----- ФОРМА ДОБАВЛЕНИЯ ----- */
    .exercise-block {
      background: var(--bg-input);
      border-radius: var(--radius-sm);
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .set-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .set-row input { width: 70px; flex: 1; min-width: 60px; padding: 8px 10px; }
    .set-row .set-label { font-size: 0.85rem; color: var(--text-muted); width: 30px; }
    .remove-set { background: none; border: none; color: var(--text-dim); font-size: 1.2rem; cursor: pointer; padding: 0 6px; }
    .remove-set:hover { color: #ef4444; }
    /* ----- СТАТИСТИКА ----- */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 12px 0;
    }
    .stat-card {
      background: var(--bg-input);
      padding: 16px 12px;
      border-radius: var(--radius-sm);
      text-align: center;
      border: 1px solid var(--border);
    }
    .stat-number { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); }
    .exercise-progress {
      margin-top: 12px;
    }
    .progress-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .progress-item .name { font-weight: 500; }
    .progress-item .value { color: var(--text-muted); }
    /* ----- АДАПТИВ ----- */
    @media (max-width: 400px) {
      .set-row input { width: 50px; flex: 0 1 50px; }
      .btn { padding: 8px 12px; font-size: 0.85rem; }
    }
  </style>
<base target="_blank">
</head>
<body>
<div id="app">
  <!-- Вкладка: Список тренировок -->
  <section id="tab-list" class="tab-content active">
    <div class="card">
      <div class="flex flex-between">
        <h2>🏋️ Мои тренировки</h2>
        <span class="tag" id="count-badge">0</span>
      </div>
    </div>
    <div id="workout-list"></div>
  </section>

  <!-- Вкладка: Добавить тренировку -->
  <section id="tab-add" class="tab-content">
    <div class="card">
      <h2>📝 Новая тренировка</h2>
      <div class="mt-2">
        <label>Дата</label>
        <div class="date-wrapper">
          <input type="date" id="workout-date" />
          <span class="date-display" id="date-display">Выберите дату</span>
        </div>
      </div>
      <div class="mt-2">
        <label>Упражнения</label>
        <div id="exercises-container"></div>
        <button class="btn btn-outline btn-sm mt-2" id="add-exercise-btn">➕ Добавить упражнение</button>
      </div>
      <button class="btn btn-block mt-2" id="save-workout-btn">💾 Сохранить тренировку</button>
    </div>
  </section>

  <!-- Вкладка: Статистика -->
  <section id="tab-stats" class="tab-content">
    <div class="card">
      <h2>📊 Статистика</h2>
      <div class="stat-grid" id="stats-overview"></div>
    </div>
    <div class="card">
      <h3>📈 Прогресс по упражнениям</h3>
      <div id="exercise-progress-list"></div>
    </div>
  </section>

  <!-- Нижние вкладки -->
  <nav class="tabs">
    <button class="tab-btn active" data-tab="tab-list"><span class="icon">📋</span> Тренировки</button>
    <button class="tab-btn" data-tab="tab-add"><span class="icon">➕</span> Добавить</button>
    <button class="tab-btn" data-tab="tab-stats"><span class="icon">📊</span> Статистика</button>
  </nav>
</div>

<script>
  (function() {
    'use strict';

    // ---------- МОДЕЛЬ ДАННЫХ ----------
    let workouts = []; // [{ id, date, exercises: [{ name, sets: [{ weight, reps }] }] }]

    function loadData() {
      try {
        const raw = localStorage.getItem('workoutAppData');
        if (raw) workouts = JSON.parse(raw);
        else workouts = [];
      } catch { workouts = []; }
    }
    function saveData() {
      localStorage.setItem('workoutAppData', JSON.stringify(workouts));
    }

    // Вспомогательные
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    // ---------- РЕНДЕРИНГ ----------
    const workoutListEl = document.getElementById('workout-list');
    const countBadge = document.getElementById('count-badge');
    const exercisesContainer = document.getElementById('exercises-container');
    const workoutDateInput = document.getElementById('workout-date');
    const statsOverview = document.getElementById('stats-overview');
    const exerciseProgressList = document.getElementById('exercise-progress-list');

    // Рендер списка тренировок
    function renderWorkoutList() {
      if (workouts.length === 0) {
        workoutListEl.innerHTML = `
          <div class="card empty-state">
            <div class="icon">🏋️</div>
            <p>Тренировок пока нет</p>
            <p class="text-dim">Добавьте первую тренировку во вкладке «Добавить»</p>
          </div>
        `;
        countBadge.textContent = '0';
        return;
      }
      countBadge.textContent = workouts.length;
      // сортировка по дате (сначала новые)
      const sorted = [...workouts].sort((a, b) => b.date.localeCompare(a.date));
      let html = '';
      sorted.forEach(w => {
        const exNames = w.exercises.map(e => e.name).join(', ');
        html += `
          <div class="card workout-item">
            <div class="workout-info">
              <div class="workout-date">${formatDate(w.date)}</div>
              <div class="workout-exercises">${exNames || 'нет упражнений'}</div>
            </div>
            <div class="workout-actions">
              <button class="btn btn-sm btn-outline" data-action="edit" data-id="${w.id}">✏️</button>
              <button class="btn btn-sm btn-danger" data-action="delete" data-id="${w.id}">🗑️</button>
            </div>
          </div>
        `;
      });
      workoutListEl.innerHTML = html;

      // Обработчики кнопок
      workoutListEl.querySelectorAll('[data-action="delete"]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          if (confirm('Удалить тренировку?')) {
            workouts = workouts.filter(w => w.id !== id);
            saveData();
            renderAll();
          }
        });
      });
      workoutListEl.querySelectorAll('[data-action="edit"]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          const workout = workouts.find(w => w.id === id);
          if (workout) {
            switchTab('tab-add');
            fillEditForm(workout);
          }
        });
      });
    }

    // Заполнение формы для редактирования
    function fillEditForm(workout) {
      workoutDateInput.value = workout.date;
      exercisesContainer.innerHTML = '';
      workout.exercises.forEach((ex, idx) => {
        addExerciseBlock(ex.name, ex.sets, idx);
      });
      const saveBtn = document.getElementById('save-workout-btn');
      saveBtn.dataset.editId = workout.id;
      saveBtn.textContent = '💾 Обновить тренировку';
    }

    // Добавление блока упражнения
    function addExerciseBlock(name = '', sets = [{ weight: '', reps: '' }], index = null) {
      const block = document.createElement('div');
      block.className = 'exercise-block';
      block.dataset.index = index !== null ? index : exercisesContainer.children.length;

      const nameRow = document.createElement('div');
      nameRow.className = 'flex flex-between';
      const nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.placeholder = 'Название упражнения';
      nameInput.value = name;
      nameInput.style.flex = '1';
      const removeBtn = document.createElement('button');
      removeBtn.className = 'btn btn-sm btn-danger';
      removeBtn.textContent = '✖';
      removeBtn.type = 'button';
      nameRow.appendChild(nameInput);
      nameRow.appendChild(removeBtn);
      block.appendChild(nameRow);

      const setsContainer = document.createElement('div');
      setsContainer.className = 'sets-container';

      function renderSets() {
        setsContainer.innerHTML = '';
        const currentSets = block._sets || sets;
        currentSets.forEach((s, i) => {
          const row = document.createElement('div');
          row.className = 'set-row';
          const label = document.createElement('span');
          label.className = 'set-label';
          label.textContent = i+1;
          const weightInput = document.createElement('input');
          weightInput.type = 'number';
          weightInput.placeholder = 'Вес';
          weightInput.value = s.weight || '';
          weightInput.step = '0.5';
          const repsInput = document.createElement('input');
          repsInput.type = 'number';
          repsInput.placeholder = 'Повт.';
          repsInput.value = s.reps || '';
          repsInput.step = '1';
          const delSet = document.createElement('button');
          delSet.className = 'remove-set';
          delSet.textContent = '✕';
          delSet.type = 'button';
          row.appendChild(label);
          row.appendChild(weightInput);
          row.appendChild(repsInput);
          row.appendChild(delSet);
          setsContainer.appendChild(row);

          delSet.addEventListener('click', () => {
            currentSets.splice(i, 1);
            renderSets();
          });
          weightInput.addEventListener('input', () => { currentSets[i].weight = weightInput.value; });
          repsInput.addEventListener('input', () => { currentSets[i].reps = repsInput.value; });
        });
        const addSetBtn = document.createElement('button');
        addSetBtn.className = 'btn btn-sm btn-outline mt-2';
        addSetBtn.textContent = '+ Подход';
        addSetBtn.type = 'button';
        addSetBtn.addEventListener('click', () => {
          currentSets.push({ weight: '', reps: '' });
          renderSets();
        });
        setsContainer.appendChild(addSetBtn);
      }

      block._sets = sets.map(s => ({ weight: s.weight || '', reps: s.reps || '' }));
      renderSets();
      block.appendChild(setsContainer);

      removeBtn.addEventListener('click', () => {
        if (exercisesContainer.children.length > 1) {
          block.remove();
        } else {
          alert('Должно быть хотя бы одно упражнение');
        }
      });

      nameInput.addEventListener('input', () => {
        block._name = nameInput.value;
      });
      block._name = name;

      exercisesContainer.appendChild(block);
    }

    // Сбор данных из формы
    function getFormData() {
      const date = workoutDateInput.value;
      if (!date) { alert('Выберите дату'); return null; }
      const blocks = exercisesContainer.querySelectorAll('.exercise-block');
      const exercises = [];
      let hasError = false;
      blocks.forEach(block => {
        const nameInput = block.querySelector('input[type="text"]');
        const name = nameInput.value.trim();
        if (!name) { hasError = true; return; }
        const setRows = block.querySelectorAll('.set-row');
        const sets = [];
        setRows.forEach(row => {
          const weight = row.querySelector('input[placeholder="Вес"]').value;
          const reps = row.querySelector('input[placeholder="Повт."]').value;
          if (weight !== '' && reps !== '') {
            sets.push({ weight: parseFloat(weight), reps: parseInt(reps, 10) });
          }
        });
        if (sets.length === 0) { hasError = true; return; }
        exercises.push({ name, sets });
      });
      if (hasError) { alert('Заполните все упражнения и подходы'); return null; }
      if (exercises.length === 0) { alert('Добавьте хотя бы одно упражнение с подходами'); return null; }
      return { date, exercises };
    }

    // Сохранение (новая или редактирование)
    function saveWorkout() {
      const data = getFormData();
      if (!data) return;
      const saveBtn = document.getElementById('save-workout-btn');
      const editId = saveBtn.dataset.editId;

      if (editId) {
        const index = workouts.findIndex(w => w.id === editId);
        if (index !== -1) {
          workouts[index] = { ...workouts[index], date: data.date, exercises: data.exercises };
          saveData();
          renderAll();
          resetForm();
          switchTab('tab-list');
        }
      } else {
        const newWorkout = {
          id: generateId(),
          date: data.date,
          exercises: data.exercises
        };
        workouts.push(newWorkout);
        saveData();
        renderAll();
        resetForm();
        switchTab('tab-list');
      }
    }

    // Сброс формы
    function resetForm() {
      workoutDateInput.value = '';
      exercisesContainer.innerHTML = '';
      addExerciseBlock('', [{ weight: '', reps: '' }]);
      const saveBtn = document.getElementById('save-workout-btn');
      delete saveBtn.dataset.editId;
      saveBtn.textContent = '💾 Сохранить тренировку';
    }

    // Рендер статистики
    function renderStats() {
      if (workouts.length === 0) {
        statsOverview.innerHTML = `<div class="stat-card"><div class="stat-number">0</div><div class="stat-label">тренировок</div></div>`;
        exerciseProgressList.innerHTML = '<p class="text-dim">Нет данных для отображения</p>';
        return;
      }
      const total = workouts.length;
      const exerciseNames = new Set();
      workouts.forEach(w => w.exercises.forEach(e => exerciseNames.add(e.name)));
      const uniqueEx = exerciseNames.size;

      const maxWeights = {};
      workouts.forEach(w => {
        w.exercises.forEach(e => {
          e.sets.forEach(s => {
            if (s.weight && s.weight > (maxWeights[e.name] || 0)) {
              maxWeights[e.name] = s.weight;
            }
          });
        });
      });

      statsOverview.innerHTML = `
        <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Всего тренировок</div></div>
        <div class="stat-card"><div class="stat-number">${uniqueEx}</div><div class="stat-label">Упражнений всего</div></div>
      `;

      let progressHtml = '';
      const sortedEx = Object.keys(maxWeights).sort();
      if (sortedEx.length === 0) {
        progressHtml = '<p class="text-dim">Нет упражнений с весом</p>';
      } else {
        sortedEx.forEach(name => {
          progressHtml += `
            <div class="progress-item">
              <span class="name">${name}</span>
              <span class="value">${maxWeights[name]} кг</span>
            </div>
          `;
        });
      }
      exerciseProgressList.innerHTML = progressHtml;
    }

    // Переключение вкладок
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
    }

    // Полный рендеринг
    function renderAll() {
      renderWorkoutList();
      renderStats();
    }

    // Обновление отображения даты
    function updateDateDisplay() {
      const display = document.getElementById('date-display');
      const val = workoutDateInput.value;
      if (val) {
        workoutDateInput.classList.add('has-value');
        const d = new Date(val + 'T00:00:00');
        display.textContent = d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
      } else {
        workoutDateInput.classList.remove('has-value');
        display.textContent = 'Выберите дату';
      }
    }

    // Инициализация
    function init() {
      loadData();
      const today = new Date().toISOString().slice(0, 10);
      workoutDateInput.value = today;
      workoutDateInput.addEventListener('input', updateDateDisplay);
      workoutDateInput.addEventListener('change', updateDateDisplay);

      exercisesContainer.innerHTML = '';
      addExerciseBlock('', [{ weight: '', reps: '' }]);

      renderAll();

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tabId = btn.dataset.tab;
          switchTab(tabId);
        });
      });

      document.getElementById('add-exercise-btn').addEventListener('click', () => {
        addExerciseBlock('', [{ weight: '', reps: '' }]);
      });

      document.getElementById('save-workout-btn').addEventListener('click', saveWorkout);
    }

    init();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('SW зарегистрирован'))
        .catch(err => console.log('SW ошибка:', err));
    }

  })();
</script>
</body>
</html>
